<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nombre del Negocio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    header {
      background: url('https://images.unsplash.com/800x400/?burger') center/cover;
      padding: 80px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 40px;
      margin: 0;
    }

    header p {
      font-size: 18px;
      color: #ddd;
    }

    section {
      padding: 30px 20px;
      text-align: center;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #222;
      border-radius: 15px;
      width: 250px;
      padding: 15px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 18px;
    }

    footer {
      background: #000;
      padding: 15px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>🍔 Nombre del Negocio</h1>
  <p>Las mejores hamburguesas de la ciudad</p>
</header>

<section>
  <h2>🔥 Nuestro Menú</h2>
  <div class="menu">
    
    <div class="card">
      <img src="https://images.unsplash.com/300x200/?burger">
      <h3>Hamburguesa Clásica</h3>
      <p>$3</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/300x200/?fries">
      <h3>Papas Fritas</h3>
      <p>$1.50</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/300x200/?soda">
      <h3>Bebida</h3>
      <p>$1</p>
    </div>

  </div>
</section>

<section>
  <h2>📍 Ubicación</h2>
  <p>Aquí va la dirección del negocio</p>
</section>

<section>
  <h2>🕒 Horarios</h2>
  <p>Lunes a Domingo: 10am - 10pm</p>
</section>

<section>
  <a class="btn" href="https://wa.me/593XXXXXXXXX" target="_blank">
    Pedir por WhatsApp
  </a>
</section>

<footer>
  <p>© 2026 Nombre del Negocio</p>
</footer>

</body>
</html>
